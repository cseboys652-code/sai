<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Upload</title>

<style>
  body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#e9f0ff;
  }

  .box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:300px;
  }

  /* hide default ugly input */
  input[type="file"]{
    display:none;
  }

  /* custom button */
  .btn{
    background:#4facfe;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    display:inline-block;
    margin-top:10px;
  }

  #preview{
    width:200px;
    height:200px;
    border:2px dashed #aaa;
    margin-top:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }

  #preview img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Select Image</h2>

  <!-- custom choose file button -->
  <label class="btn" for="fileInput">Choose File</label>
  <input type="file" id="fileInput" accept="image/*" onchange="showImage(event)">

  <div id="preview">No Image</div>
</div>

<script>
function showImage(event){
  let file = event.target.files[0];

  if(file){
    let reader = new FileReader();

    reader.onload = function(e){
      document.getElementById("preview").innerHTML =
        `<img src="${e.target.result}">`;
    }

    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
