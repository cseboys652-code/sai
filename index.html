<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>APEC Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #4facfe, #00f2fe, #f093fb);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0077ff;
    }

    .welcome {
      font-size: 18px;
      margin-bottom: 15px;
      color: #555;
    }

    /* IMAGE PREVIEW BOX */
    #preview {
      width: 120px;
      height: 120px;
      margin: 10px auto;
      border-radius: 10px;
      border: 2px dashed #aaa;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="welcome">Welcome APEC 🎓</div>
    <h1>Login</h1>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <!-- IMAGE SELECT -->
    <input type="file" accept="image/*" onchange="loadImage(event)">

    <!-- PREVIEW AREA -->
    <div id="preview">No Image</div>

    <button>Login</button>
  </div>

  <script>
    function loadImage(event) {
      const preview = document.getElementById("preview");
      const file = event.target.files[0];

      if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
          preview.innerHTML = `<img src="${e.target.result}">`;
        }

        reader.readAsDataURL(file);
      }
    }
  </script>

</body>
</html>
